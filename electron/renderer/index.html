<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Körber Stellium AI Connector</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="brand">
        <img style="width: 80%;" src="https://koerber-stellium.com/wp-content/uploads/2026/02/Korber_Stellium_Black-e1772874735722-1536x383.webp" alt="Körber Stellium Logo" class="logo">
      </div>
      
      <div class="modules-container">
        <div class="module-card active" data-module="abap">
          <div class="module-icon">⚙️</div>
          <div class="module-text">
            <h3>ABAP</h3>
            <p>Active</p>
          </div>
        </div>
        <div class="module-card" data-module="cap">
          <div class="module-icon">☁️</div>
          <div class="module-text">
            <h3>CAP</h3>
            <p>Inactive</p>
          </div>
        </div>
        <div class="module-card disabled">
          <div class="module-icon">📱</div>
          <div class="module-text">
            <h3>Fiori</h3>
            <p>Coming Soon</p>
          </div>
        </div>
        <div class="module-card disabled">
          <div class="module-icon">✉️</div>
          <div class="module-text">
            <h3>Email</h3>
            <p>Coming Soon</p>
          </div>
        </div>
      </div>

      <div class="credits">
        Developed by <b>Toshif & Lohith</b>
      </div>
    </aside>

    <main class="main-content">
      <div class="header">
        <h1>Körber Stellium AI Connector</h1>
        <p class="description">
          Enter your connection details below. These will be saved locally.
        </p>
      </div>
      
      <form id="configForm">
        <div id="formFields"></div>
        <button type="submit" id="saveBtn">Save and Connect</button>
      </form>
      
      <div id="commandInfo" class="hidden">
        <h3>Configuration Saved!</h3>
        <p></p>
        <pre id="commandBlock"></pre>
        <button id="copyBtn" type="button">Copy JSON</button>
      </div>
    </main>
  </div>
  
  <script src="renderer.js"></script>
</body>
</html>
